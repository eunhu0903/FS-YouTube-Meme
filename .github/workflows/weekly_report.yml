name: Fetch YouTube Videos Weekly

on:
  schedule:
    - cron: "0 0 * * 1"  # 매주 월요일 오전 9시 (KST 기준)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          pip install -r requirements.txt

      - name: 실행
        run: |
          python app/main.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "chore: weekly video data update" || echo "No changes"
          git push